# Remote dev VPS — shared (non-secret) options.
# The actual HostName/User live in ~/.ssh/config.local (not tracked), which is
# Included *before* this file so it wins on any overlapping key. Minimal local:
#
#   Host dev
#       HostName 203.0.113.10
#       User tarek
#
# Why these options:
#   Port 443         — sshd also listens on 443, slips through restrictive/captive
#                      networks (Syria) that only allow web ports. Override in
#                      config.local if your VPS keeps ssh on 22.
#   ControlMaster    — one multiplexed connection reused by every `ssh dev`, so
#                      `fwd`/`dev-forward` inject port-forwards into the LIVE
#                      session with no reconnect (see the helpers in ~/.zshrc).
#   ServerAlive*     — detect dead links fast on flaky mobile/travel connections.
Host dev
    Port 443
    ControlMaster auto
    ControlPath ~/.ssh/cm-%r@%h-%p
    ControlPersist 10m
    ServerAliveInterval 30
    ServerAliveCountMax 3
    TCPKeepAlive yes
    ForwardAgent no
